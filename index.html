<!DOCTYPE html>
<html>
<head>
    <title>Asmi Dumre Profile</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            background-color: black;
            color: white;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .profile-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 2px solid white;
            border-radius: 15px;
            padding: 20px;
            max-width: 600px;
            width: 100%;
        }

        .photo {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background-color: gray;
            border: 2px solid white;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 14px;
            margin-bottom: 15px;
        }

        h2 {
            margin-bottom: 15px;
        }

        .info-line {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            width: 100%;
            margin-bottom: 15px;
        }

        .info-box {
            border: 1px solid white;
            border-radius: 10px;
            padding: 10px;
            margin: 5px;
            flex: 1 1 45%;
            text-align: center;
        }

        .hobbies, .education {
            border: 2px solid white;
            border-radius: 10px;
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            text-align: center;
        }

        ul {
            padding-left: 20px;
            text-align: left;
        }
    </style>
</head>
<body>

<div class="profile-container">

    <!-- Photo section -->
    <div class="photo">Photo</div>

    <h2>Asmi Dumre</h2>

    <!-- Straight line info -->
    <div class="info-line">
        <div class="info-box">DOB: 2067/05/11</div>
        <div class="info-box">Age: 17</div>
        <div class="info-box">Address: Syangja</div>
        <div class="info-box">Grade: 11</div>
        <div class="info-box">Nationality: Nepalese</div>
        <div class="info-box">Gender: Female</div>
    </div>

    <!-- Hobbies -->
    <div class="hobbies">
        <h3>Hobbies:</h3>
        <ul>
            <li>Singing</li>
            <li>Traveling</li>
            <li>Writing</li>
        </ul>
    </div>

    <!-- Education -->
    <div class="education">
        <p><b>SEE Pass</b></p>
        <p>From Shree Janahit Secondary School</p>
        <p>GPA: 2.97</p>
    </div>

</div>

</body>
  </html>
